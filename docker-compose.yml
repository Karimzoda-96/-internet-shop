services:
  postgres:
    image: postgres:16-alpine
    container_name: azhar-postgres
    environment:
      POSTGRES_DB: azhar
      POSTGRES_USER: ${DB_USERNAME:-azhar}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-azhar}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-azhar} -d azhar"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    container_name: azhar-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: ${DB_URL:-jdbc:postgresql://postgres:5432/azhar}
      DB_USERNAME: ${DB_USERNAME:-azhar}
      DB_PASSWORD: ${DB_PASSWORD:-azhar}
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-to-a-long-random-value-at-least-32-characters}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      JPA_DDL_AUTO: ${JPA_DDL_AUTO:-update}
      SERVER_PORT: 8080
    ports:
      - "8080:8080"

volumes:
  postgres_data:
